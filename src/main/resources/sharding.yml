dataSources:
  shardwallet1:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://localhost:3306/shardwallet1
    username: root
    password:

  shardwallet2:
    dataSourceClassName: com.zaxxer.hikari.HikariDataSource
    driverClassName: com.mysql.cj.jdbc.Driver
    jdbcUrl: jdbc:mysql://localhost:3306/shardwallet2
    username: root
    password:

rules:
  -  !SHARDING
    defaultDatabaseStrategy:
      standard:
        shardingColumn: id
        shardingAlgorithmName: db_inline
    tables:
      user:
        actualDataNodes: shardwallet${1..2}.user
        databaseStrategy:
          standard:
            shardingColumn: id
            shardingAlgorithmName: db_inline
        keyGenerateStrategy:
          column: id
          keyGeneratorName: snowflakestrategy


    shardingAlgorithms:
      db_inline:
        type: INLINE
        props:
          algorithm-expression: shardwallet$->{id % 2 + 1}


    keyGenerators:
      snowflakestrategy:
        type: SNOWFLAKE
