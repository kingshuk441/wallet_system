spring:
  application:
    name: wallet-system


  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  properties:
    hibernate:
      format_sql: true
      dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: false
    locations: classpath:db/migration

  datasource:
    url: jdbc:shardingsphere:classpath:sharding.yml
    driver-class-name: org.apache.shardingsphere.driver.ShardingSphereDriver

  sql:
    init:
      mode: never
